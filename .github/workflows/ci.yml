name: CI
on: [push, pull_request]
jobs:
  # Fast, dependency-light path: tests pass with ZERO ML deps (lexical fallback).
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -m coverage run -m pytest tests/ -v
      - run: python -m coverage report
      # Smoke-test the demo runs offline.
      - run: python examples/drift_demo.py

  # Lint + type check. Dependency-light (no model), so it's fast and gating.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[lint]"
      - run: ruff check purposeguard tests benchmark examples
      # mypy is lenient (see pyproject [tool.mypy]); informational until the
      # baseline is exhaustively annotated, so it can't block unrelated PRs.
      - run: mypy purposeguard
        continue-on-error: true

  # Slower path: actually exercise the embedding scorer we recommend, so the
  # default experience is covered in CI (not just the lexical floor). Separate
  # job, single Python, model download cached.
  test-embeddings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2
      # Install the optional adapter dep too, so the real-AMG integration test
      # (importorskip) actually RUNS here instead of silently skipping -- the
      # genuine PolicyViolation/block path must be exercised in CI, not just locally.
      - run: pip install -e ".[dev,embeddings]" agent-memory-guard
      # Fail loudly if embeddings don't actually load — otherwise this job would
      # silently fall back to lexical and pass, defeating its purpose.
      - run: python -c "from purposeguard import PurposeGuard; PurposeGuard(purpose='billing payment refund', require_embeddings=True); print('embeddings OK')"
      - run: python -m pytest tests/ -v
      # End-to-end embedding path: benchmark + adversarial suite on real vectors.
      - run: python benchmark/run.py
      - run: python benchmark/adversarial.py
